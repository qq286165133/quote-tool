name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flet==0.86.0 flet-cli==0.86.0

      - name: Build APK
        run: |
          yes | flet build apk \
            --project "quote_tool" \
            --artifact "报价工具" \
            --org "com.acrylic" \
            --product "报价工具" \
            --description "Acrylic box quote calculator" \
            --no-android-splash \
            --no-compile-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 报价工具
          path: build/apk/
